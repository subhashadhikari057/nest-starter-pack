name: auction-system

services:
    postgres:
        image: postgres:18-alpine
        container_name: auction-system-postgres
        ports:
            - "5433:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-auction-system}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
            POSTGRES_DB: ${POSTGRES_DB:-auction_system}
        volumes:
            - postgres_data:/var/lib/postgresql
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auction-system} -d ${POSTGRES_DB:-auction_system}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: auction-system
        command: >
            sh -c 'set -e;
            REDIS_USER="${REDIS_USERNAME:-auction-system}";
            REDIS_PASS="${REDIS_PASSWORD:-securepassword}";
            mkdir -p /usr/local/etc/redis;
            printf "user default off\nuser %s on >%s allkeys allcommands allchannels\n" "$$REDIS_USER" "$$REDIS_PASS" > /usr/local/etc/redis/users.acl;
            exec redis-server --aclfile /usr/local/etc/redis/users.acl'
        ports:
            - "6380:6379"
        volumes:
            - redis_data:/data
        environment:
            - REDIS_USERNAME=${REDIS_USERNAME:-auction-system}
            - REDIS_PASSWORD=${REDIS_PASSWORD:-securepassword}
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "-u", "redis://${REDIS_USERNAME:-auction-system}:${REDIS_PASSWORD:-securepassword}@localhost:6379", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

